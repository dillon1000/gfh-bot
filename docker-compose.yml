services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gfh_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gfh_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    image: ${BOT_IMAGE:-ghcr.io/dillon1000/gfh-bot:latest}
    pull_policy: always
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      DISCORD_ADMIN_USER_IDS: ${DISCORD_ADMIN_USER_IDS:-}
      DISCORD_PRESENCE_STATUS: ${DISCORD_PRESENCE_STATUS:-}
      DISCORD_ACTIVITY_TYPE: ${DISCORD_ACTIVITY_TYPE:-}
      DISCORD_ACTIVITY_TEXT: ${DISCORD_ACTIVITY_TEXT:-}
      DISCORD_ACTIVITY_URL: ${DISCORD_ACTIVITY_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POLL_CREATION_LIMIT_PER_HOUR: ${POLL_CREATION_LIMIT_PER_HOUR:-10}
      MEOW_LIMIT_PER_HOUR: ${MEOW_LIMIT_PER_HOUR:-5}
      SEARCH_LIMIT_PER_MINUTE: ${SEARCH_LIMIT_PER_MINUTE:-5}
      MARKET_DEFAULT_TIMEZONE: ${MARKET_DEFAULT_TIMEZONE:-America/Chicago}
      XAI_API_KEY: ${XAI_API_KEY:-}
      CORPSE_OPENER_MODEL: ${CORPSE_OPENER_MODEL:-grok-2-1212}
      QUIPS_GROK_MODEL: ${QUIPS_GROK_MODEL:-grok-4.20-beta-latest-non-reasoning}
      QUIPS_GEMINI_MODEL: ${QUIPS_GEMINI_MODEL:-gemini-3.1-pro}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      APP_REVISION: ${APP_REVISION:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gfh_bot?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    profiles:
      - autoupdate
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - bot

volumes:
  postgres_data:
  redis_data:
